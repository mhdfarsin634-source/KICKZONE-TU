<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKZONE | Official Booking</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #2ecc71; 
            --dark-bg: #0a0a0a; 
            --card-bg: #161616;
            --danger: #ff4757; 
            --text: #ffffff;
            --wa: #25D366;
            --ig: #E1306C;
            --yt: #FF0000;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--dark-bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 15px 120px 15px; margin: 0; 
        }

        .container { width: 100%; max-width: 450px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 42px; font-weight: 900; font-style: italic; }
        .header p { color: #555; margin: 5px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; }

        .admin-section { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        #adminBtn { background: #222; border: 1px solid #333; color: #666; padding: 8px 14px; border-radius: 10px; font-size: 11px; cursor: pointer; }

        input[type="date"] { 
            width: 100%; padding: 18px; background: var(--card-bg); 
            border: 1px solid #2a2a2a; border-radius: 15px; color: white; 
            font-size: 18px; margin-bottom: 25px; outline: none; box-sizing: border-box;
        }

        .slots-container { display: grid; gap: 12px; }
        .slot { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 22px; border-radius: 18px; background: var(--card-bg);
            border: 1px solid #222; transition: 0.2s;
        }
        .slot.booked { border-left: 6px solid var(--danger); }
        .slot.available { border-left: 6px solid var(--primary); }
        .slot.expired { border-left: 6px solid #444; opacity: 0.35; }
        .slot.live-hour { border-left: 6px solid #3498db; box-shadow: 0 0 12px rgba(52, 152, 219, 0.25); }

        .time-text { font-size: 17px; font-weight: 800; display: block; letter-spacing: 0.5px; text-transform: lowercase; }
        .status-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 6px; margin-top: 8px; display: inline-block; }
        
        .available .status-badge { background: rgba(46, 204, 113, 0.1); color: var(--primary); }
        .booked .status-badge { background: rgba(255, 71, 87, 0.1); color: var(--danger); }
        .expired .status-badge { background: rgba(255, 255, 255, 0.05); color: #777; }
        .live-hour .status-badge { background: rgba(52, 152, 219, 0.15); color: #3498db; }

        /* Visual Polish: Soft Pulse Glow for open available slots */
        .slot.available .status-badge { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Visual Polish: Clean, Pill-Shaped Buttons */
        .btn-action { 
            padding: 10px 22px; border: none; border-radius: 25px; 
            font-weight: 800; cursor: pointer; display: none; font-size: 12px; 
            transition: transform 0.1s;
        }
        .admin-active .btn-action { display: block; }
        .btn-action:active { transform: scale(0.93); }

        .social-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            padding: 12px 10px; display: flex; justify-content: space-around; 
            align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.6); z-index: 9999;
        }
        .social-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .icon-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
        .social-label { font-size: 9px; color: #888; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="admin-section">
        <button id="adminBtn" onclick="unlockAdmin()">STAFF LOGIN</button>
    </div>
    <div class="header">
        <h1>KICKZONE</h1>
        <p>Football & Cricket Turf</p>
    </div>
    <input type="date" id="datePicker">
    <div id="slotsDisplay" class="slots-container">Connecting to Database...</div>
</div>

<div class="social-bar">
    <a href="https://chat.whatsapp.com/JOVOSsRttwrK5mTFlx2D6I?mode=gi_t" target="_blank" class="social-item">
        <div class="icon-circle" style="background: var(--wa);"><i class="fab fa-whatsapp"></i></div>
        <span class="social-label">Group</span>
    </a>
    <a href="https://www.instagram.com/kickzone_turf_?igsh=MW42ejNxbjdxbGlxbg==" target="_blank" class="social-item">
        <div class="icon-circle" style="background: var(--ig);"><i class="fab fa-instagram"></i></div>
        <span class="social-label">Instagram</span>
    </a>
    <a href="https://www.youtube.com/@kickzone_turf" target="_blank" class="social-item">
        <div class="icon-circle" style="background: var(--yt);"><i class="fab fa-youtube"></i></div>
        <span class="social-label">YouTube</span>
    </a>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kickzone-turf-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;
    const adminPIN = "8590"; 

    const datePicker = document.getElementById('datePicker');
    const todayStr = new Date().toISOString().split('T')[0];
    datePicker.value = todayStr;
    datePicker.setAttribute('min', todayStr); // Smart Date Management: Restrict past calendar selections

    function unlockAdmin() {
        if (prompt("Staff PIN:") === adminPIN) {
            isAdmin = true;
            document.body.classList.add('admin-active');
            document.getElementById('adminBtn').innerText = "ADMIN ACTIVE";
            document.getElementById('adminBtn').style.background = "var(--primary)";
            document.getElementById('adminBtn').style.color = "black";
            syncData(); // Re-trigger mapping to instantly render protected text fields
        }
    }

    function formatTime(h) {
        let hour = h % 24;
        let ampm = (hour >= 12 && hour < 24) ? 'pm' : 'am';
        let displayHour = hour % 12 || 12;
        if (h === 24) {
            displayHour = 12;
            ampm = 'am';
        }
        return `${displayHour} ${ampm}`;
    }

    function syncData() {
        db.ref('bookings/' + datePicker.value).on('value', (snap) => {
            render(snap.val() || {});
        });
    }

    function render(bookedData) {
        const display = document.getElementById('slotsDisplay');
        display.innerHTML = '';
        
        const now = new Date();
        const currentHour = now.getHours();
        const isToday = datePicker.value === todayStr;
        let targetedLiveElement = null;
        
        for (let h = 6; h < 24; h++) {
            const timeKey = `${h}:00`;
            const booking = bookedData[timeKey];
            const isBooked = !!booking;
            
            // Smart Date Management: Determine layout status timeline rules
            let slotState = "available";
            let displayBadge = "AVAILABLE";
            
            if (isBooked) {
                slotState = "booked";
                displayBadge = "OCCUPIED";
            } else if (isToday && h < currentHour) {
                slotState = "expired";
                displayBadge = "EXPIRED";
            } else if (isToday && h === currentHour) {
                slotState = "live-hour";
                displayBadge = "LIVE NOW";
            }
            
            const slotDiv = document.createElement('div');
            slotDiv.className = `slot ${slotState}`;
            if (slotState === "live-hour") {
                targetedLiveElement = slotDiv;
            }
            
            slotDiv.innerHTML = `
                <div>
                    <span class="time-text">${formatTime(h)} to ${formatTime(h + 1)}</span>
                    <span class="status-badge">${displayBadge}</span>
                    ${(isBooked && isAdmin) ? `<div style="font-size:11px; color:#aaa; margin-top:8px; font-weight:bold;">Client: ${booking.name || 'Staff Entry'}</div>` : ''}
                </div>
                <button class="btn-action" style="background:${isBooked ? 'var(--danger)' : 'var(--primary)'}" 
                        onclick="toggle('${timeKey}', ${isBooked})">
                    ${isBooked ? 'Clear' : 'Confirm'}
                </button>`;
            display.appendChild(slotDiv);
        }

        // Auto-Scroll: Position screen center focused on live operational window
        if (targetedLiveElement) {
            setTimeout(() => {
                targetedLiveElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }
    }

    function toggle(time, isBooked) {
        if (!isAdmin) return;
        const ref = db.ref('bookings/' + datePicker.value + '/' + time);
        if (isBooked) {
            if(confirm("Cancel this booking?")) ref.set(null);
        } else {
            // Expanded Admin Data: Captures specific profile string identifiers
            const name = prompt("Customer Name:");
            if(name) {
                ref.set({ name: name, timestamp: Date.now() });
            }
        }
    }

    datePicker.onchange = syncData;
    syncData();
</script>
</body>
</html>
