<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKZONE | Booking Status</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2ecc71; --dark: #1a1a1a; --danger: #e74c3c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { background: var(--dark); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid #333; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 32px; letter-spacing: 2px; }
        
        .admin-lock { text-align: right; margin-bottom: 10px; }
        #adminBtn { background: #222; border: 1px solid #444; color: #888; font-size: 11px; cursor: pointer; border-radius: 4px; padding: 5px 10px; }
        
        input[type="date"] { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; }
        input[type="date"]:focus { border-color: var(--primary); }

        .slots-container { display: grid; gap: 10px; }
        .slot { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 10px; background: #1e1e1e; border-left: 6px solid var(--primary); transition: 0.3s; }
        .booked { border-left-color: var(--danger); background: #261a1a; }
        
        /* Admin Mode Styling */
        .admin-active .slot { border-top: 1px solid #333; border-right: 1px solid #333; }
        .btn-action { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: none; text-transform: uppercase; }
        .admin-active .btn-action { display: block; }
        
        .btn-confirm { background: var(--primary); color: #000; }
        .btn-cancel { background: var(--danger); color: #fff; }
        .status-label { font-weight: bold; font-size: 13px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="admin-lock">
        <button id="adminBtn" onclick="unlockAdmin()">STAFF LOGIN</button>
    </div>
    <div class="header">
        <h1>KICKZONE</h1>
        <p style="margin:5px 0; color:#666;">Live Availability</p>
    </div>
    
    <input type="date" id="datePicker">
    <div id="slotsDisplay" class="slots-container">Connecting to Kickzone Database...</div>
</div>

<script>
    // 1. CONFIGURATION
    const firebaseConfig = { databaseURL: "YOUR_FIREBASE_URL_HERE" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;
    const adminPIN = "8590"; // Your New PIN

    const datePicker = document.getElementById('datePicker');
    datePicker.value = new Date().toISOString().split('T')[0];

    function unlockAdmin() {
        const pass = prompt("Kickzone Admin PIN:");
        if (pass === adminPIN) {
            isAdmin = true;
            document.getElementById('mainContainer').classList.add('admin-active');
            document.getElementById('adminBtn').innerText = "ADMIN MODE ACTIVE";
            document.getElementById('adminBtn').style.backgroundColor = "var(--primary)";
            document.getElementById('adminBtn').style.color = "black";
        } else {
            alert("Unauthorized.");
        }
    }

    function syncData() {
        const date = datePicker.value;
        const display = document.getElementById('slotsDisplay');
        
        db.ref('bookings/' + date).on('value', (snapshot) => {
            const data = snapshot.val() || {};
            renderSlots(data, date);
        });
    }

    function renderSlots(bookedData, date) {
        const display = document.getElementById('slotsDisplay');
        display.innerHTML = '';
        
        for (let h = 6; h < 24; h++) {
            const timeKey = h + ":00";
            const isBooked = bookedData[timeKey];
            
            const startHour = h > 12 ? h-12 : h;
            const ampm = h >= 12 ? 'PM' : 'AM';
            const endHour = (h+1) > 12 ? (h+1)-12 : (h+1);
            const endAmpm = (h+1) >= 12 && (h+1) < 24 ? 'PM' : 'AM';
            
            const slotDiv = document.createElement('div');
            slotDiv.className = `slot ${isBooked ? 'booked' : ''}`;
            slotDiv.innerHTML = `
                <div>
                    <strong>${startHour} ${ampm} - ${endHour} ${endAmpm}</strong>
                    <span class="status-label" style="color:${isBooked ? 'var(--danger)' : 'var(--primary)'}">
                        ${isBooked ? '● BOOKED' : '○ AVAILABLE'}
                    </span>
                </div>
                <button class="btn-action ${isBooked ? 'btn-cancel' : 'btn-confirm'}" 
                        onclick="toggle('${date}', '${timeKey}', ${!!isBooked})">
                    ${isBooked ? 'Cancel' : 'Confirm'}
                </button>`;
            display.appendChild(slotDiv);
        }
    }

    function toggle(date, time, isBooked) {
        if (!isAdmin) return;
        const msg = isBooked ? "Cancel this booking?" : "Confirm this slot as BOOKED?";
        if(confirm(msg)) {
            db.ref('bookings/' + date + '/' + time).set(isBooked ? null : true);
        }
    }

    datePicker.onchange = syncData;
    syncData();
</script>
</body>
</html>
